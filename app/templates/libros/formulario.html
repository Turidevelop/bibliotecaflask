{% extends 'base.html' %}

{% block title %}{% if libro %}Editar{% else %}Nuevo{% endif %} Libro - Biblioteca{% endblock %}

{% block content %}
<h2>{% if libro %}<i class="fas fa-edit"></i> Editar Libro{% else %}<i class="fas fa-plus"></i> Agregar Nuevo Libro{% endif %}</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" name="titulo" value="{{ libro.titulo if libro else '' }}" required>
    </div>
    
    <div class="form-group">
        <label for="autor">Autor:</label>
        <input type="text" id="autor" name="autor" value="{{ libro.autor if libro else '' }}" required>
    </div>
    
    <div class="form-group">
        <label for="isbn">ISBN:</label>
        <input type="text" id="isbn" name="isbn" value="{{ libro.isbn if libro else '' }}">
    </div>
    
    <div class="form-group">
        <label for="categoria_id">Categoría:</label>
        <select id="categoria_id" name="categoria_id" required>
            <option value="">Selecciona una categoría</option>
            {% if categorias %}
                {% for cat in categorias %}
                <option value="{{ cat.id }}" {% if libro and libro.categoria_id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                {% endfor %}
            {% endif %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="anio_publicacion">Año de Publicación:</label>
        <input type="number" id="anio_publicacion" name="anio_publicacion" value="{{ libro.anio_publicacion if libro else '' }}" min="1800" max="2100">
    </div>
    
    <div class="form-group">
        <label for="cantidad_total">Cantidad Total:</label>
        <input type="number" id="cantidad_total" name="cantidad_total" value="{{ libro.cantidad_total if libro else '' }}" required min="1">
    </div>
    
    <div class="form-group">
        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion" rows="4">{{ libro.descripcion if libro else '' }}</textarea>
    </div>
    
    <button type="submit" class="btn btn-primary">{% if libro %}Actualizar{% else %}Guardar{% endif %} Libro</button>
    <a href="{{ url_for('libros.lista_libros') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
