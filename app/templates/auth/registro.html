{% extends 'base.html' %}

{% block title %}Registro - Biblioteca{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2><i class="fas fa-edit"></i> Registro de Usuarios</h2>
        
        {% if success %}
        <div class="alert alert-success">
            ¡Registro exitoso! <a href="{{ url_for('auth.login') }}">Inicia sesión aquí</a>
        </div>
        {% endif %}
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        
        {% if not success %}
        <form method="POST">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            
            <button type="submit" class="btn btn-primary">Registrarse</button>
        </form>
        {% endif %}
        
        <p class="auth-link"><a href="{{ url_for('auth.login') }}">Volver al login</a></p>
    </div>
</div>
{% endblock %}
